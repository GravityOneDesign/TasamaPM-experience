name: sdz-tasama-design-ui

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sdz-tasama-design-ui:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: tasama-angular/package-lock.json

    - name: Install and Build Angular
      working-directory: ./tasama-angular
      run: |
        npm install --legacy-peer-deps
        npm run build

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: |
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }

    - name: Deploy to sdz-tasama-pm-ui
      uses: azure/webapps-deploy@v2
      with:
        app-name: sdz-tasama-pm-ui
        # This deploys ONLY the contents of the Angular build folder to the root
        package: tasama-angular/dist/tasama-angular/browser
