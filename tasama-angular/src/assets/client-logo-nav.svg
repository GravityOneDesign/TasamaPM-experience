<svg width="170" height="34" viewBox="0 0 170 34" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Geometric Logo Icon (Hexagon / Triangles in Gradient) -->
  <g transform="translate(0, 4)">
    <polygon points="10,0 26,6 26,20 10,26 0,20 0,6" fill="url(#clientGrad)" opacity="0.9"/>
    <polygon points="10,3 22,8 22,18 10,23 3,18 3,8" fill="#ffffff" opacity="0.3"/>
    <path d="M10,6 L20,10 L10,14 L10,6" fill="url(#clientGrad2)"/>
  </g>
  
  <!-- Modern Text "Client Logo" or "CLIENT CO." -->
  <text x="36" y="21" font-family="'Outfit', 'Inter', sans-serif" font-size="15" font-weight="800" fill="#0EA5E9" letter-spacing="0.5">CLIENT</text>
  <text x="96" y="21" font-family="'Outfit', 'Inter', sans-serif" font-size="15" font-weight="400" fill="#475569" letter-spacing="0.5">CO.</text>

  <defs>
    <linearGradient id="clientGrad" x1="0" y1="0" x2="26" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="clientGrad2" x1="10" y1="6" x2="20" y2="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
</svg>
